name = "notion-webhook-logger"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Set secrets (never commit real values):
#   npx wrangler secret put NOTION_KEY
#   npx wrangler secret put NOTION_DATABASE_ID
#   npx wrangler secret put WEBHOOK_SECRET  (optional — callers must send a matching X-Webhook-Secret header)
